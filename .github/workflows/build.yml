name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  QEMU_VERSION: "10.1.4"

jobs:
  job_build_host_files:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: actions/cache@v4
        id: cache-host-files
        env:
          cache-name: cache-host-files
        with:
          path: out/host-x86
          # Hash every build input that determines out/host-x86 content, not
          # just host-x86.answers. run_make_host SKIPS rebuilding stage0
          # binaries and the host tools (bin/bh0x, bin/dd, bin/fatput, ...)
          # when a restored cache already contains them, gated only by an
          # answers check / bin/fatget existing. host-x86.answers does NOT
          # cover tools/*.c or run.sh / distfiles.sh, so a cache hit served
          # stale host-tool binaries (built from pre-change tools/*.c) and a
          # host tree built by a broken intermediate distfiles.sh stayed
          # poisoned across runs even after the bug was fixed. Hashing
          # tools/scripts/run.sh/distfiles.sh makes the cache correct by
          # construction. restore-keys is the exact full key (no loose
          # prefix) so a hash mismatch rebuilds rather than restoring a
          # stale tree.
          key: build-${{ env.cache-name }}-${{ hashFiles('host-x86.answers', 'run.sh', 'distfiles.sh', 'tools/**', 'scripts/**') }}-v8
          restore-keys: |
            build-${{ env.cache-name }}-${{ hashFiles('host-x86.answers', 'run.sh', 'distfiles.sh', 'tools/**', 'scripts/**') }}-v8
      - run: sh run.sh make_host
      # Fail-fast at the point of corruption: a complete mes tarball must
      # carry the readdir.dir/file fixture and a sane member count. Without
      # this gate a poisoned/empty tarball silently propagates to every
      # matrix job, surfacing only as a confusing in-image
      # `cp .../readdir.dir/file` error far downstream.
      - name: Verify host mes tarball is complete
        run: |
          f=out/host-x86/distfiles/mes-0.27.1.tar.gz
          test -f "$f" || { echo "FATAL: $f missing after make_host"; exit 1; }
          n=$(zcat "$f" | tar -tf - | grep -c .)
          echo "mes tarball members: $n"
          test "$n" -gt 1000 || { echo "FATAL: mes tarball has only $n members (truncated/empty)"; exit 1; }
          zcat "$f" | tar -tf - | grep -qF 'lib/tests/dirent/readdir.dir/file' \
            || { echo "FATAL: readdir.dir/file absent from mes tarball"; exit 1; }
          echo "mes tarball OK"
      - uses: actions/upload-artifact@v4
        with:
          name: host_files
          path: out/host-x86

  job_build_k0_img:
    runs-on: ubuntu-24.04
    needs: job_build_host_files
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86,     board: bios,    qemu: x86_64  }
          - { arch: amd64,   board: uefi,    qemu: x86_64  }
          - { arch: aarch64, board: virt,    qemu: aarch64 }
          - { arch: aarch64, board: raspi3b, qemu: aarch64 }
          - { arch: riscv64, board: virt,    qemu: riscv64 }
          - { arch: riscv64, board: uefi,    qemu: riscv64 }
          - { arch: riscv64, board: sifive_u, qemu: riscv64 }
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/action_get_host_artifact
      - run: >
          ARCH=${{ matrix.arch }}
          BOARD=${{ matrix.board }}
          QEMU=qemu-local/bin/qemu-system-${{ matrix.qemu }}
          sh run.sh make_k0_img
      # Snapshot pre-boot bytes so the artifact mirrors fresh build output.
      # boot_k0_img mutates k0-*.img / k0-*-fat.img in place (kernel
      # /dev/hda rewrite for non-UEFI; append-mode catm.efi for UEFI), so
      # re-booting the post-boot artifact replays double-applied state and
      # crashes the UEFI binaries. Restore before upload.
      - run: |
          cp out/k0-${{ matrix.arch }}-${{ matrix.board }}.img /tmp/preboot.img
          test -f out/k0-${{ matrix.arch }}-${{ matrix.board }}-fat.img && cp out/k0-${{ matrix.arch }}-${{ matrix.board }}-fat.img /tmp/preboot-fat.img || true
      - run: >
          ARCH=${{ matrix.arch }}
          BOARD=${{ matrix.board }}
          QEMU=qemu-local/bin/qemu-system-${{ matrix.qemu }}
          sh run.sh boot_k0_img sha256sum_k0_answers
      - run: git diff --exit-code k0-${{ matrix.arch }}-${{ matrix.board }}.answers
      - run: |
          mv /tmp/preboot.img out/k0-${{ matrix.arch }}-${{ matrix.board }}.img
          test -f /tmp/preboot-fat.img && mv /tmp/preboot-fat.img out/k0-${{ matrix.arch }}-${{ matrix.board }}-fat.img || true
      - uses: actions/upload-artifact@v4
        with:
          name: k0_img_${{ matrix.arch }}_${{ matrix.board }}
          path: |
            out/k0-${{ matrix.arch }}-${{ matrix.board }}.img
            out/k0-${{ matrix.arch }}-${{ matrix.board }}-fat.img

  job_test_k0_img:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: job_build_host_files
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86,     board: bios,    qemu: x86_64  }
          - { arch: amd64,   board: uefi,    qemu: x86_64  }
          - { arch: aarch64, board: virt,    qemu: aarch64 }
          - { arch: aarch64, board: raspi3b, qemu: aarch64 }
          - { arch: riscv64, board: virt,    qemu: riscv64 }
          - { arch: riscv64, board: uefi,    qemu: riscv64 }
          - { arch: riscv64, board: sifive_u, qemu: riscv64 }
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/action_get_host_artifact
      - name: Run seal breaking test
        env:
          ARCH: ${{ matrix.arch }}
          BOARD: ${{ matrix.board }}
          QEMU: qemu-local/bin/qemu-system-${{ matrix.qemu }}
        run: |
          # Remove old checksum file
          rm "k0-${ARCH}-${BOARD}.answers"

          # Build k0.img with self-breaking boot (generates new checksum)
          FORCE_FAIL=yes sh run.sh make_k0_img

          # Capture pre-boot seal (sha256sum_k0_answers writes when file
          # is absent; this happens before any disk mutation)
          sh run.sh sha256sum_k0_answers

          # Boot the image; FORCE_FAIL injects a self-modifying step
          sh run.sh boot_k0_img

          # Re-verify the now-mutated image against the pre-boot seal.
          # The seal MUST fail; ! makes a failure here pass the test.
          ! sh run.sh sha256sum_k0_answers &&
            echo "'FAILED' sha256sum message here is pass, 'PASSED' means fail."

  job_boot_k0_img:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: job_build_k0_img
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86,     board: bios,    qemu: x86_64  }
          - { arch: amd64,   board: uefi,    qemu: x86_64  }
          - { arch: aarch64, board: virt,    qemu: aarch64 }
          - { arch: aarch64, board: raspi3b, qemu: aarch64 }
          - { arch: riscv64, board: virt,    qemu: riscv64 }
          - { arch: riscv64, board: uefi,    qemu: riscv64 }
          - { arch: riscv64, board: sifive_u, qemu: riscv64 }
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/action_get_host_artifact
      - uses: actions/download-artifact@v4
        with:
          name: k0_img_${{ matrix.arch }}_${{ matrix.board }}
          path: out
      - run: >
          ARCH=${{ matrix.arch }}
          BOARD=${{ matrix.board }}
          QEMU=qemu-local/bin/qemu-system-${{ matrix.qemu }}
          sh run.sh boot_k0_img
